# AGBD Training Configuration
# RATIONALE: Clean training config focusing only on training-specific parameters
# Based on original AGBD training parameters from https://github.com/ghjuliasialelli/AGBD

train: true
work_dir: ""
seed: 234
use_wandb: true
wandb_run_id: null

# Training parameters - optimized for AGBD based on original scripts
num_workers: 8     # Match AGBD original (cpus-per-task=8)
batch_size: 8     # Reduced from 32 to debug input size mismatch issue
test_num_workers: 8
test_batch_size: 32

# Experiment settings
finetune: false
limited_label_train: 1
limited_label_val: 1
limited_label_strategy: stratified
stratification_bins: 3
data_replicate: 1
use_final_ckpt: false
ckpt_dir: null
show_model: false

# Visualization settings
visualization_interval: 300  # Reduced frequency: every 5 minutes instead of 1 minute

# AGBD-specific preprocessing strategy  
# CRITICAL: Use percentile normalization to match original AGBD (norm_strat='pct')
# Original AGBD uses 1st/99th percentiles vs Pangaea's min/max (~5-6x range difference)
defaults:
  - _self_
  - task: ???
  - dataset: ???
  - encoder: ???
  - decoder: ???
  - preprocessing: reg_agbd_percentile  # Use percentile normalization to match original AGBD
  - criterion: ???
  - optimizer: adamw
  - lr_scheduler: multi_step_lr
