# AGBD-specific training configuration
# Based on original AGBD training parameters from https://github.com/ghjuliasialelli/AGBD

train: true
work_dir: "" #"/cluster/scratch/user/" #-> ADAPT IF RUNNING ON CLUSTER WITH LIMITED HOME DISK SPACE
seed: 234
use_wandb: true
wandb_run_id: null

# TRAINING - AGBD-optimized parameters
num_workers: 8  # Increased from 4 to match AGBD scripts (cpus-per-task=8)
batch_size: 8  # Increased from 8 to match AGBD scripts

test_num_workers: 8
test_batch_size: 8  # Increased from 1 for efficiency

# MULTI-GPU FIXES & IMAGE PROCESSING STRATEGY (from recent meeting)
# CRITICAL: Fixes MSE/MAE calculation bugs and implements padding strategy

# Image processing strategy - MEETING DECISION: Pad with zeros instead of resizing  
image_processing_strategy: padding  # Use padding to maintain 1 pixel = 10-16 meters resolution
use_padding_strategy: true  # Configuration flag for preprocessing strategy
maintain_spatial_resolution: true  # Avoid checkerboard patterns from decoder

# Central pixel scaling rule (as discussed in meeting)
central_pixel_scaling_enabled: true
# Rule: 25x25→1x1, 50x50→2x2, 250x250→10x10 central pixel
finetune: false
limited_label_train: 1
limited_label_val: 1
limited_label_strategy: stratified  # Options: stratified, oversampled, random
stratification_bins: 3 #  number of bins for stratified sampling, only for stratified
data_replicate: 1
use_final_ckpt: false
ckpt_dir: null
show_model: False  # added to be able to print model and save it if wanted

# PREPROCESSING STRATEGY SELECTION (CRITICAL MEETING DECISION)
# Use padding strategy to maintain spatial resolution (1 pixel = 10-16 meters)
# UPDATED: Using reg_agbd_original (has padding but NO normalization - dataset handles it)
# To use new padding strategy: preprocessing=reg_agbd_original (recommended - matches original AGBD)
# To use old resizing strategy: preprocessing=reg_agbd_resize (causes checkerboard patterns)

defaults:
  - _self_
  - task: ???
  - dataset: ???
  - encoder: ???
  - decoder: ???
  - preprocessing: reg_agbd_padding  # Set to reg_agbd_padding for proper PANGAEA normalization with padding
  - criterion: ???
  - optimizer: adamw
  - lr_scheduler: multi_step_lr

visualization_interval: 60
