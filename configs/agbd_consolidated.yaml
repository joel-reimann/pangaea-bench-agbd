# AGBD Dataset Configuration - CONSOLIDATED VERSION
# 
# RATIONALE: Consolidating scattered YAML configurations into a single, well-documented file
# to eliminate configuration sprawl and improve maintainability as outlined in instructions.
# 
# This replaces: train_agbd.yaml, central_pixel_scaling.yaml, and preprocessing configs
# CRITICAL FIXES: 
# 1. Padding strategy for ViT alignment (25x25 → 32x32 to fix checkerboard artifacts)
# 2. Proper ignore_index handling for padded regions  
# 3. Original AGBD normalization preserved (dataset handles internally)

# =============================================================================
# TRAINING CONFIGURATION 
# =============================================================================
train: true
work_dir: ""
seed: 234
use_wandb: true
wandb_run_id: null

# Training parameters - optimized for AGBD based on original scripts
num_workers: 8  # Match AGBD original (cpus-per-task=8)
batch_size: 128  # Match AGBD original
test_num_workers: 8
test_batch_size: 32

# Experiment settings
finetune: false
limited_label_train: 1
limited_label_val: 1
limited_label_strategy: stratified
stratification_bins: 3
data_replicate: 1
use_final_ckpt: false
ckpt_dir: null
show_model: false

# Visualization settings
visualization_interval: 60

# =============================================================================
# AGBD DATASET CONFIGURATION
# =============================================================================
dataset:
  _target_: pangaea.datasets.agbd.AGBD
  dataset_name: AGBD
  
  # Paths - to be overridden at runtime
  root_path: ./data/agbd
  hdf5_dir: ./data/agbd  
  mapping_path: ./data/agbd
  norm_path: ./data/agbd
  
  # Dataset parameters from original AGBD
  version: 4
  download_url: null  # Manual download required
  auto_download: false
  chunk_size: 1  # AGBD is patch-based
  years: [2019, 2020]
  
  # CRITICAL FIX: Pad 25x25 to 32x32 for ViT token alignment 
  # (25 % 16 != 0 causes checkerboard artifacts)
  img_size: 32
  
  # Modality settings
  multi_temporal: false  # AGBD is not multi-temporal
  multi_modal: true      # S2 optical + SAR bands
  debug: false           # Set to true for quick testing
  
  # Regression task parameters
  ignore_index: -1       # For loss masking of padded regions
  num_classes: 1         # Regression = 1 output
  classes: [regression]
  distribution: [1.0]
  
  # Band configuration - preserve original AGBD band order
  bands:
    optical: [B1, B2, B3, B4, B5, B6, B7, B8, B8A, B9, B11, B12]
    # Note: auxiliary bands commented out as not used by most models
    # auxiliary: [DEM, CH_ch, CH_std, LC_1, LC_2, S2_SCL]
  
  # Original AGBD normalization statistics (from diagnostic logs)
  # CRITICAL: These must match the original AGBD paper normalization
  data_mean:
    optical: [0.12478869, 0.13480005, 0.16031432, 0.1532097, 0.20312776, 0.32636437, 0.36605212, 0.3811653, 0.3910436, 0.3910644, 0.2917373, 0.21169408]
  data_std:
    optical: [0.062151887, 0.06751032, 0.07726742, 0.07890389, 0.088616066, 0.11668778, 0.12504442, 0.12462059, 0.122079074, 0.11809166, 0.102067, 0.089834645]

# =============================================================================
# PREPROCESSING STRATEGY - PADDING APPROACH
# =============================================================================
# RATIONALE: Use padding instead of resizing to maintain spatial resolution
# (1 pixel = 10-16 meters) and avoid checkerboard patterns from decoder
preprocessing:
  train:
    _target_: pangaea.engine.data_preprocessor.Preprocessor
    preprocessor_cfg:
      # CRITICAL: Pad when image smaller than encoder requires
      - _target_: pangaea.engine.data_preprocessor.RandomCropToEncoder
        pad_if_needed: true
      - _target_: pangaea.engine.data_preprocessor.BandFilter
      # NOTE: Using original AGBD normalization (handled in dataset)
      # NO PANGAEA normalization to preserve scientific accuracy
      - _target_: pangaea.engine.data_preprocessor.BandPadding
        fill_value: 0.0  # Pad with zeros as decided in meeting
  
  val:
    _target_: pangaea.engine.data_preprocessor.Preprocessor
    preprocessor_cfg:
      # Use center crop for validation to focus on central pixel
      - _target_: pangaea.engine.data_preprocessor.FocusRandomCropToEncoder
        pad_if_needed: true
      - _target_: pangaea.engine.data_preprocessor.BandFilter
      - _target_: pangaea.engine.data_preprocessor.BandPadding
        fill_value: 0.0
  
  test:
    _target_: pangaea.engine.data_preprocessor.Preprocessor
    preprocessor_cfg:
      # Same as validation for consistent evaluation
      - _target_: pangaea.engine.data_preprocessor.FocusRandomCropToEncoder
        pad_if_needed: true
      - _target_: pangaea.engine.data_preprocessor.BandFilter
      - _target_: pangaea.engine.data_preprocessor.BandPadding
        fill_value: 0.0

# =============================================================================
# MODEL ARCHITECTURE CONFIGURATION
# =============================================================================
# Default model settings - to be overridden by specific encoder/decoder configs
task:
  trainer:
    _target_: pangaea.engine.trainer.RegTrainer
    n_epochs: 80
    precision: fp32
    ckpt_interval: 20
    eval_interval: 5
    log_interval: 5
    best_metric_key: MSE
    use_wandb: ${use_wandb}
  
  evaluator:
    _target_: pangaea.engine.evaluator.RegEvaluator
    inference_mode: sliding
    sliding_inference_batch: 8
    visualization_interval: ${visualization_interval}
    use_wandb: ${use_wandb}

# Default criterion for regression
criterion:
  _target_: torch.nn.MSELoss

# Default optimizer
optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-4
  betas: [0.9, 0.999]
  weight_decay: 0.05

# Default learning rate scheduler  
lr_scheduler:
  _target_: pangaea.utils.schedulers.MultiStepLR
  lr_milestones: [0.6, 0.9]

# =============================================================================
# CENTRAL PIXEL SCALING RULE
# =============================================================================
# Meeting decision: 25x25→1x1, 50x50→2x2, 250x250→10x10 central pixel
central_pixel_scaling:
  enabled: true
  base_image_size: 25  # Original AGBD patch size
  base_central_size: 1 # Central pixel for regression target
  maintain_spatial_resolution: true  # Keep 1 pixel = 10-16 meters
